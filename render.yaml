services:
  - type: web
    name: salary-prediction-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5

      - key: DATABASE_PATH
        value: history.db

      - key: FLASK_ENV
        value: production

      - key: SECRET_KEY
        generateValue: true
